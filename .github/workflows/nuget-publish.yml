name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*.*'       # Trigger when tags like v1.0.0 are pushed
  workflow_dispatch:   # Provide manual trigger option from GitHub Actions UI

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    - name: Set Version Environment Variable
      id: get_version
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        if [ "$VERSION" = "main" ] || [ "$VERSION" = "" ]; then
          VERSION="1.0.${{ github.run_number }}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Building and packing version: $VERSION"

    - name: Restore dependencies
      run: dotnet restore src/Messaging.Core.csproj

    - name: Build project
      run: dotnet build src/Messaging.Core.csproj --configuration Release --no-restore

    - name: Pack NuGet package
      run: >
        dotnet pack src/Messaging.Core.csproj
        --configuration Release
        --no-build
        -p:PackageVersion=${{ env.VERSION }}
        --output ./nupkg

    - name: Publish to NuGet.org
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
